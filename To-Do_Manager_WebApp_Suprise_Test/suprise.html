<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="./design%20.css">
</head>
<body>
    <main class="container py-4 py-md-5">
        <section class="app-shell p-3 p-md-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-4">
                <h1 class="app-title h3 mb-0">Smart To-Do Manager</h1>
                <span class="text-secondary">Plan smart. Execute faster.</span>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-12 col-lg-5">
                    <label for="taskName" class="form-label">Task Name</label>
                    <input id="taskName" type="text" class="form-control" placeholder="e.g., Prepare sprint report">
                </div>
                <div class="col-6 col-lg-3">
                    <label for="taskPriority" class="form-label">Priority</label>
                    <select id="taskPriority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="col-6 col-lg-3">
                    <label for="taskDeadline" class="form-label">Deadline</label>
                    <input id="taskDeadline" type="date" class="form-control">
                </div>
                <div class="col-12 col-lg-1 d-grid">
                    <label class="form-label d-none d-lg-block">&nbsp;</label>
                    <button id="addTaskBtn" class="btn btn-primary">Add</button>
                </div>
            </div>

            <div class="row g-3 align-items-end mb-3">
                <div class="col-12 col-md-6">
                    <label for="searchInput" class="form-label">Search Tasks</label>
                    <input id="searchInput" type="text" class="form-control" placeholder="Type to search by task name">
                </div>
                <div class="col-12 col-md-6">
                    <label for="sortSelect" class="form-label">Sort By</label>
                    <select id="sortSelect" class="form-select">
                        <option value="none" selected>None</option>
                        <option value="priority">Priority (High to Low)</option>
                        <option value="deadline">Deadline (Nearest first)</option>
                    </select>
                </div>
            </div>

            <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                <span class="fw-semibold me-1">Filter:</span>
                <button class="btn btn-outline-success btn-filter active" data-filter="all" type="button">All</button>
                <button class="btn btn-outline-success btn-filter" data-filter="completed" type="button">Completed</button>
                <button class="btn btn-outline-success btn-filter" data-filter="pending" type="button">Pending</button>
            </div>

            <div class="row g-3 mb-4" id="counters">
                <div class="col-12 col-md-4">
                    <div class="counter-card p-3 h-100">
                        <div class="text-secondary small">Total Tasks</div>
                        <div id="totalCount" class="h4 mb-0">0</div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="counter-card p-3 h-100">
                        <div class="text-secondary small">Completed Tasks</div>
                        <div id="completedCount" class="h4 mb-0 text-success">0</div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="counter-card p-3 h-100">
                        <div class="text-secondary small">Pending Tasks</div>
                        <div id="pendingCount" class="h4 mb-0 text-warning">0</div>
                    </div>
                </div>
            </div>

            <section>
                <h2 class="h5 mb-3">Task List</h2>
                <div id="taskList" class="d-flex flex-column gap-2"></div>
            </section>
        </section>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="./add.js"></script>
</body>
</html>
